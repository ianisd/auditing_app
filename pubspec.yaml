name: counting_app
description: "Offline Stock Counting App"
publish_to: 'none'
version: 1.0.1+5

environment:
  sdk: ">=3.10.4 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1

  # HTTP & Networking
  dio: ^5.6.0
  http: ^1.2.1
  connectivity_plus: ^7.0.0

  # Utilities
  uuid: ^4.5.0
  intl: ^0.20.2

  # UI Components
  table_calendar: ^3.0.13

  # Barcode Scanning (UPDATED VERSION)
  mobile_scanner: ^7.1.4  # Updated: Better than barcode_scan2
  camera: ^0.11.1+1

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true